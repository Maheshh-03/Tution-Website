 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f7fb;
    }

    .sidebar {
      width: 240px;
      position: fixed;
      height: 100vh;
      background: #0f172a;
      padding: 20px;
      color: #fff;
    }

    .sidebar a {
      display: block;
      color: #cbd5f5;
      padding: 12px;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .sidebar a.active,
    .sidebar a:hover {
      background: #1e293b;
      color: #fff;
    }

    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .card {
      border-radius: 16px;
      border: none;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    .course-badge {
      background: #e0e7ff;
      color: #1e3a8a;
      padding: 8px 14px;
      border-radius: 20px;
      display: inline-block;
      margin: 6px 6px 0 0;
      font-size: 0.85rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h5 class="fw-bold mb-4">🎓 Student</h5>
  <a href="student-dashboard.html">🏠 Dashboard</a>
  <a href="student-profile.html" class="active">👤 Profile</a>
  <a href="#">📚 My Courses</a>
  <hr>
  <button  id="dashboardLogoutBtn" class="btn btn-link text-danger p-0">
    🚪 Logout
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <h3 class="fw-bold mb-4">My Profile</h3>

  <div class="card p-4 mb-4">
    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" disabled  aria-label="sans-serif">
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" disabled aria-label="sans-serif">
      </div>

      <div class="col-md-6">
        <label class="form-label">Mobile</label>
        <input type="text" id="phone" class="form-control" aria-label="sans-serif">
      </div>

    </div>
  </div>

  <!-- ENROLLED COURSES -->
  <div class="card p-4">
    <h5 class="fw-bold mb-3">Enrolled Courses</h5>
    <div id="courseList">
      <span class="text-muted">Loading courses...</span>
    </div>
  </div>

</div>

<script src="bootstrap.bundle.min.js"></script>
 <script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= AUTH PROTECT ================= */
  const token = sessionStorage.getItem("token");
  const user  = JSON.parse(sessionStorage.getItem("user"));

  if (!token || !user) {
    window.location.replace("/index.html");
    return;
  }

  /* ================= FILL PROFILE ================= */
  const nameEl  = document.getElementById("name");
  const emailEl = document.getElementById("email");
  const phoneEl = document.getElementById("phone");

  if (nameEl)  nameEl.value  = user.name || "";
  if (emailEl) emailEl.value = user.email || "";
  if (phoneEl) phoneEl.value = user.phone || "";

  /* ================= LOAD ENROLLED COURSES ================= */
  fetch("/api/my-enrollments", {
    headers: {
      Authorization: "Bearer " + token
    }
  })
    .then(res => {
      if (!res.ok) throw new Error("Unauthorized");
      return res.json();
    })
    .then(data => {
      const courseList = document.getElementById("courseList");
      if (!courseList) return;

      courseList.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        courseList.innerHTML =
          `<span class="text-muted">No courses enrolled yet</span>`;
        return;
      }

      data.forEach(c => {
        const badge = document.createElement("span");
        badge.className = "course-badge";
        badge.textContent = c.course;
        courseList.appendChild(badge);
      });
    })
    .catch(err => {
      console.error("Profile enrollments error:", err);
    });

  /* ================= LOGOUT ================= */
   const btn = document.getElementById("dashboardLogoutBtn");

btn?.addEventListener("click", () => {
  sessionStorage.removeItem("token");
  sessionStorage.removeItem("user");

  console.log("Dashboard logout");
  console.log("localStorage token =", localStorage.getItem("token")); // MUST EXIST

  window.location.replace("index.html");
});


});
</script>


</body>
</html>
